name: Publish Nivryn release to Discord

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to announce, or latest
        required: true
        default: latest
        type: string
      test_mode:
        description: Label the message as TEST and use the test fields below
        required: true
        default: false
        type: boolean
      notes_override:
        description: Optional changelog override for a manual production announcement
        required: false
        default: ""
        type: string
      test_version:
        description: Version used only when test mode is enabled
        required: true
        default: 0.0.0-test
        type: string
      test_notes:
        description: Changelog used only when test mode is enabled
        required: true
        default: Test announcement from the Nivryn GitHub workflow.
        type: string
      dry_run:
        description: Build payloads without posting to Discord
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: discord-release-${{ github.event.release.id || github.run_id }}
  cancel-in-progress: false

jobs:
  announce:
    name: Publish Nivryn announcements
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DISCORD_ANNOUNCEMENTS_WEBHOOK: ${{ secrets.DISCORD_ANNOUNCEMENTS_WEBHOOK }}
      DISCORD_CHANGELOG_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
      DISCORD_UPDATE_ROLE_ID: ${{ vars.DISCORD_UPDATE_ROLE_ID }}
      GITHUB_TOKEN: ${{ github.token }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      RELEASE_TAG: ${{ inputs.release_tag || 'latest' }}
      NOTES_OVERRIDE: ${{ inputs.notes_override || '' }}
      TEST_MODE: ${{ inputs.test_mode || 'false' }}
      TEST_VERSION: ${{ inputs.test_version || '0.0.0-test' }}
      TEST_NOTES: ${{ inputs.test_notes || 'Test announcement from the Nivryn GitHub workflow.' }}
    steps:
      - name: Check out Nivryn announcement script
        uses: actions/checkout@v6

      - name: Publish Nivryn release to Discord
        run: python .github/scripts/announce_discord_release.py
